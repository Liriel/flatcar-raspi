variant: flatcar
version: 1.0.0

# ── Traceway OTel Agent — sysext + Ignition wiring ──────────────────────────
#
# Usage:
#   1. Replace YOUR_PROJECT_TOKEN below with your Traceway project token.
#   2. Optionally set TRACEWAY_SERVICE_NAME (defaults to hostname).
#   3. Transpile with Butane:
#        butane --pretty --strict butane.yaml > ignition.json
#   4. Pass ignition.json as "user data" when provisioning your Flatcar node.
#
# What this config does on first boot:
#   - Downloads the sysext image (.raw) from your GitHub release.
#   - Verifies its sha256 checksum.
#   - Places it in /etc/extensions/ where systemd-sysext picks it up.
#   - Writes /etc/traceway-otel-agent/token (mode 0600) with the credentials.
#   - Writes /etc/traceway-otel-agent/config.yaml (the default agent config).
#   - Enables the traceway-otel-agent.service unit (shipped inside the sysext).
# ────────────────────────────────────────────────────────────────────────────


storage:
  directories:
    - path: /etc/traceway-otel-agent
      mode: 0700

    # Runtime state directory (writable — sysext /usr is read-only)
    - path: /var/lib/traceway-otel-agent
      mode: 0700

    # systemd-sysext reads images from here
    - path: /etc/extensions

  files:
    files:
    - path: /opt/extensions/docker_compose/docker-compose-5.1.4-arm64.raw
      contents:
        source: https://github.com/flatcar/sysext-bakery/releases/download/latest/docker-compose-5.1.4-arm64.raw
    # ── Credentials (mode 0600 — only root reads this) ─────────────────────
    - path: /etc/traceway-otel-agent/token
      mode: 0600
      contents:
        inline: |
          TRACEWAY_TOKEN=YOUR_PROJECT_TOKEN
          TRACEWAY_ENDPOINT=https://cloud.tracewayapp.com/api/otel
          TRACEWAY_SERVICE_NAME=

    # ── Agent config ────────────────────────────────────────────────────────
    # This is a copy of the upstream default.yaml.
    # Edit freely — the agent is started with --config pointing here.
    - path: /etc/traceway-otel-agent/config.yaml
      mode: 0644
      contents:
        inline: |
          # Traceway OTel Agent — default config
          # Source: https://github.com/tracewayapp/traceway-otel-agent/blob/main/config/default.yaml
          # Env vars (TRACEWAY_TOKEN, TRACEWAY_ENDPOINT, TRACEWAY_SERVICE_NAME)
          # are injected by systemd from /etc/traceway-otel-agent/token.

          extensions:
            health_check:
              endpoint: "127.0.0.1:13133"

          receivers:
            hostmetrics:
              collection_interval: 60s
              scrapers:
                cpu: {}
                load: {}
                memory: {}
                disk: {}
                filesystem: {}
                network: {}

          processors:
            memory_limiter:
              limit_mib: 256
              check_interval: 5s
            resourcedetection:
              detectors: [env, system, ec2, gce, azure]
              timeout: 5s
            batch:
              timeout: 10s
              send_batch_size: 8192

          exporters:
            otlphttp:
              endpoint: "${env:TRACEWAY_ENDPOINT}"
              compression: gzip
              headers:
                Authorization: "Bearer ${env:TRACEWAY_TOKEN}"
              retry_on_failure:
                enabled: true
                initial_interval: 5s
                max_interval: 30s
                max_elapsed_time: 5m
              sending_queue:
                enabled: true

          service:
            extensions: [health_check]
            pipelines:
              metrics:
                receivers: [hostmetrics]
                processors: [memory_limiter, resourcedetection, batch]
                exporters: [otlphttp]

    # ── Download script: runs once on first boot via a systemd oneshot ──────
    - path: /opt/bin/install-traceway-sysext.sh
      mode: 0755
      contents:
        inline: |
          #!/bin/bash
          set -euo pipefail

          # ── Edit these two lines when you cut a new sysext release ────────
          GITHUB_REPO="YOUR_GITHUB_USERNAME/traceway-sysext"
          SYSEXT_TAG="v0.5.0"
          # ──────────────────────────────────────────────────────────────────

          # amd64 cloud / bare-metal Flatcar pulls the x86-64 image.
          # Local filename MUST match the image's extension-release name.
          IMAGE="traceway-otel-agent-x86-64"
          DEST="/etc/extensions/${IMAGE}.raw"
          BASE="https://github.com/${GITHUB_REPO}/releases/download/${SYSEXT_TAG}"

          echo "Downloading ${IMAGE}.raw (${SYSEXT_TAG})..."
          curl -fsSL "${BASE}/${IMAGE}.raw"        -o "${DEST}.tmp"
          curl -fsSL "${BASE}/${IMAGE}.raw.sha256" -o "${DEST}.sha256"

          # Verify checksum (file contains "HASH  traceway-otel-agent.raw")
          expected=$(awk '{print $1}' "${DEST}.sha256")
          actual=$(sha256sum "${DEST}.tmp" | awk '{print $1}')
          if [ "${expected}" != "${actual}" ]; then
            echo "Checksum mismatch! expected=${expected} got=${actual}" >&2
            rm -f "${DEST}.tmp"
            exit 1
          fi

          mv "${DEST}.tmp" "${DEST}"
          echo "Installed ${DEST}"
          # Reload sysext images so the new image is merged into /usr
          systemd-sysext refresh
          systemctl daemon-reload
          systemctl start traceway-otel-agent.service

  links:
    - target: /opt/extensions/docker_compose/docker-compose-5.1.4-arm64.raw
      path: /etc/extensions/docker_compose.raw
      hard: false

systemd:
  units:
    # ── Oneshot that downloads the sysext on first boot ────────────────────
    - name: install-traceway-sysext.service
      enabled: true
      contents: |
        [Unit]
        Description=Download and install Traceway sysext image
        After=network-online.target
        Wants=network-online.target
        # Only run once — remove the stamp file to re-run on next boot
        ConditionPathExists=!/var/lib/traceway-otel-agent/.sysext-installed

        [Service]
        Type=oneshot
        RemainAfterExit=yes
        ExecStart=/opt/bin/install-traceway-sysext.sh
        ExecStartPost=/bin/touch /var/lib/traceway-otel-agent/.sysext-installed

        [Install]
        WantedBy=multi-user.target

    # The traceway-otel-agent.service unit ships *inside* the sysext image
    # (pre-enabled via a multi-user.target.wants symlink baked into the image),
    # so it does not need to be declared here. Ignition cannot enable a unit
    # it can't see at provisioning time, before the sysext is mounted.
