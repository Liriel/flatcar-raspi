variant: flatcar
version: 1.0.0

# ── Traceway OTel Agent on Flatcar / Raspberry Pi 4 ─────────────────────────
#
# This is the EXAMPLE template (committed to git). Don't edit it in place.
# Copy it to cfg/butane.yaml (gitignored) and fill in your secrets there:
#   cp cfg/butane.example.yaml cfg/butane.yaml
#
# Then edit the three sections marked CONFIGURE in cfg/butane.yaml and transpile:
#   make transpile     # or: butane --pretty --strict cfg/butane.yaml > cfg/ignition.json
#
# ────────────────────────────────────────────────────────────────────────────

# ── CONFIGURE 1 of 4: SSH access ────────────────────────────────────────────
# Replace the placeholder with your actual public key.
# Get it with:  cat ~/.ssh/id_ed25519.pub   (or id_rsa.pub)
passwd:
  users:
    - name: core
      ssh_authorized_keys:
        - "ssh-ed25519 AAAAC3Nza... your-public-key-here"

# ── CONFIGURE 2 of 4: Kernel args (required for Pi serial + autologin) ──────
# These match what the Flatcar Pi docs require. Leave them as-is unless you
# specifically don't want autologin on tty1.
kernel_arguments:
  should_exist:
    - console=ttyAMA0,115200n8
    - console=tty1
    - flatcar.autologin
    - usbcore.autosuspend=-1

storage:
  directories:
    - path: /etc/traceway-otel-agent
      mode: 0700
    - path: /var/lib/traceway-otel-agent
      mode: 0700
    - path: /etc/extensions

  files:
    # ── OPTIONAL: Wi-Fi (STEADY-STATE ONLY — first boot must use Ethernet) ───
    # ⚠️ Wi-Fi cannot be used for provisioning or first boot. Ignition runs in
    # the initramfs, which only brings up *wired* interfaces via DHCP (no Wi-Fi
    # driver stack); the wpa_supplicant config below only takes effect once the
    # booted system is up. The docker-compose sysext (fetched by Ignition) and
    # the first-boot traceway sysext download both happen before Wi-Fi
    # associates. So: PLUG IN ETHERNET FOR THE FIRST BOOT. After one successful
    # boot the sysexts are on disk + stamped and never re-download, so the Pi
    # then runs on Wi-Fi alone across reboots. See INSTALL.md §2d.
    #
    # Skip this whole block if the Pi stays on Ethernet. To use Wi-Fi for
    # steady-state, uncomment the two files below AND the wpa_supplicant unit at
    # the bottom of this file, then fill in your SSID and passphrase. The Pi 4's
    # onboard brcmfmac Wi-Fi shows up as wlan0; if `ip link` reports a different
    # name on first boot, rename these files and the unit to match.
    #
    # - path: /etc/wpa_supplicant/wpa_supplicant-wlan0.conf
    #   mode: 0600
    #   contents:
    #     inline: |
    #       ctrl_interface=/run/wpa_supplicant
    #       ctrl_interface_group=wheel
    #       update_config=1
    #
    #       network={
    #           ssid="YOUR_WIFI_SSID"
    #           psk="YOUR_WIFI_PASSPHRASE"
    #       }
    # - path: /etc/systemd/network/25-wlan0.network
    #   mode: 0644
    #   contents:
    #     inline: |
    #       [Match]
    #       Name=wlan0
    #
    #       [Network]
    #       DHCP=yes
    #       MulticastDNS=yes      # so <hostname>.local works over Wi-Fi too

    # ── kitty terminfo (xterm-kitty) ─────────────────────────────────────────
    # Flatcar ships no xterm-kitty terminfo entry, so SSHing in from the kitty
    # terminal (which sets TERM=xterm-kitty) breaks clear/less/vim with
    # "terminal not fully functional" / "unknown terminal type". This drops the
    # compiled terminfo into /etc/terminfo (an ncurses search path; /usr is
    # read-only) so the entry resolves. The base64 below is the upstream
    # xterm-kitty entry (sha256 d26fac9b51b83e41bfb3acdf6ea1d44e079983d00a19350ec8829b4b84f76bf4);
    # regenerate with: base64 -w0 /usr/share/terminfo/x/xterm-kitty
    #
    # Alternatively, skip this and connect with `kitten ssh <host>`, which copies
    # the terminfo over automatically — but a plain `ssh` needs this file.
    - path: /etc/terminfo/x/xterm-kitty
      mode: 0644
      contents:
        source: "data:;base64,"

    # ── docker-compose sysext (from the Flatcar sysext-bakery) ───────────────
    # NOT fetched by Ignition. The Pi 4 has no RTC, so at Ignition time (in the
    # initramfs, before NTP) the clock is set to systemd's build date — a date
    # in the past — and GitHub's TLS cert looks "not yet valid", so an Ignition
    # `source:` HTTPS fetch dies with "tls: failed to verify certificate".
    # Instead it is downloaded at boot, after the clock syncs, by
    # install-docker-compose-sysext.service (see the script + unit below).

    # ── CONFIGURE 3 of 4: Traceway credentials ──────────────────────────────
    - path: /etc/traceway-otel-agent/token
      mode: 0600
      contents:
        inline: |
          TRACEWAY_TOKEN=YOUR_PROJECT_TOKEN
          TRACEWAY_ENDPOINT=https://cloud.tracewayapp.com/api/otel
          # Leave blank to use the hostname automatically
          TRACEWAY_SERVICE_NAME=

    # ── Agent config (edit freely after provisioning) ────────────────────────
    - path: /etc/traceway-otel-agent/config.yaml
      mode: 0644
      contents:
        inline: |
          extensions:
            health_check:
              endpoint: "127.0.0.1:13133"

          receivers:
            hostmetrics:
              collection_interval: 60s
              scrapers:
                cpu: {}
                load: {}
                memory: {}
                disk: {}
                filesystem: {}
                network: {}

          processors:
            memory_limiter:
              limit_mib: 256
              check_interval: 5s
            resourcedetection:
              detectors: [env, system]
              timeout: 5s
            batch:
              timeout: 10s
              send_batch_size: 8192

          exporters:
            otlphttp:
              endpoint: "${env:TRACEWAY_ENDPOINT}"
              compression: gzip
              headers:
                Authorization: "Bearer ${env:TRACEWAY_TOKEN}"
              retry_on_failure:
                enabled: true
                initial_interval: 5s
                max_interval: 30s
                max_elapsed_time: 5m
              sending_queue:
                enabled: true

          service:
            extensions: [health_check]
            pipelines:
              metrics:
                receivers: [hostmetrics]
                processors: [memory_limiter, resourcedetection, batch]
                exporters: [otlphttp]

    # ── CONFIGURE 4 of 4: Hostname (this is also the mDNS .local name) ───────
    # The node's hostname — and what it answers to over mDNS, so once booted you
    # can reach it as <hostname>.local (e.g. ssh core@flatcar-pi.local) from any
    # machine on the LAN. That's the "avahi magic", but done natively by
    # systemd-resolved, which Flatcar already ships — no avahi package or extra
    # sysext required. Change the name below to whatever you want this Pi called.
    - path: /etc/hostname
      mode: 0644
      contents:
        inline: flatcar-pi

    # ── mDNS responder (powers the <hostname>.local resolution above) ────────
    # 1. Turn on systemd-resolved's multicast-DNS responder + resolver globally.
    - path: /etc/systemd/resolved.conf.d/10-mdns.conf
      mode: 0644
      contents:
        inline: |
          [Resolve]
          MulticastDNS=yes
    # 2. Switch mDNS on for the wired link. zz-default.network is Flatcar's
    #    built-in catch-all DHCP unit for ethernet; this drop-in only adds the
    #    mDNS flag and leaves its DHCP behaviour untouched. (Wi-Fi carries the
    #    same MulticastDNS=yes line in its 25-wlan0.network block above, once
    #    you uncomment it.)
    - path: /etc/systemd/network/zz-default.network.d/10-mdns.conf
      mode: 0644
      contents:
        inline: |
          [Network]
          MulticastDNS=yes

    # ── Sysext download script ───────────────────────────────────────────────
    - path: /opt/bin/install-traceway-sysext.sh
      mode: 0755
      contents:
        inline: |
          #!/bin/bash
          set -euo pipefail

          # ── Update these when you cut a new sysext release ────────────────
          GITHUB_REPO="Liriel/"
          SYSEXT_TAG="v0.0.1"
          # ──────────────────────────────────────────────────────────────────

          # Raspberry Pi 4 runs arm64-usr Flatcar, so we pull the arm64 image.
          # The local filename MUST match the image's extension-release name
          # (traceway-otel-agent-arm64) or systemd-sysext will refuse to merge it.
          IMAGE="traceway-otel-agent-arm64"
          DEST="/etc/extensions/${IMAGE}.raw"
          BASE="https://github.com/${GITHUB_REPO}/releases/download/${SYSEXT_TAG}"

          echo "Downloading ${IMAGE}.raw (${SYSEXT_TAG})..."
          curl -fsSL "${BASE}/${IMAGE}.raw"        -o "${DEST}.tmp"
          curl -fsSL "${BASE}/${IMAGE}.raw.sha256" -o "${DEST}.sha256"

          expected=$(awk '{print $1}' "${DEST}.sha256")
          actual=$(sha256sum "${DEST}.tmp" | awk '{print $1}')
          if [ "${expected}" != "${actual}" ]; then
            echo "Checksum mismatch! expected=${expected} got=${actual}" >&2
            rm -f "${DEST}.tmp"
            exit 1
          fi

          mv "${DEST}.tmp" "${DEST}"
          echo "Installed ${DEST}"
          systemd-sysext refresh
          # Reload unit files now visible from the merged /usr, then start the
          # agent. The baked-in multi-user.target.wants symlink handles enabling
          # on subsequent boots; this start covers the current boot.
          systemctl daemon-reload
          systemctl start traceway-otel-agent.service

    # ── docker-compose sysext download script (runs at boot, not in Ignition) ─
    - path: /opt/bin/install-docker-compose-sysext.sh
      mode: 0755
      contents:
        inline: |
          #!/bin/bash
          set -euo pipefail

          # docker-compose sysext from the Flatcar sysext-bakery. Pulled at boot
          # (after the clock syncs) rather than by Ignition — see the note in the
          # storage section. The asset must exist in the bakery's rolling
          # "latest" release; bump COMPOSE_VERSION if it's pruned:
          #   https://github.com/flatcar/sysext-bakery/releases/tag/latest
          COMPOSE_VERSION="2.24.5"
          ARCH="arm64"   # Raspberry Pi 4 runs arm64-usr Flatcar

          # The destination filename's name part (docker_compose) MUST match the
          # image's extension-release name, or systemd-sysext silently refuses to
          # merge it. The bakery's image is ARCHITECTURE=arm64 — matches the Pi.
          IMAGE="docker_compose"
          ASSET="${IMAGE}-${COMPOSE_VERSION}-${ARCH}.raw"
          DEST="/etc/extensions/${IMAGE}.raw"
          BASE="https://github.com/flatcar/sysext-bakery/releases/download/latest"

          echo "Downloading ${ASSET}..."
          curl -fsSL "${BASE}/${ASSET}"     -o "${DEST}.tmp"
          # The bakery ships one SHA256SUMS for the whole release (no per-asset file).
          curl -fsSL "${BASE}/SHA256SUMS"   -o "${DEST}.sums"

          expected=$(awk -v f="${ASSET}" '$2 == f {print $1}' "${DEST}.sums")
          actual=$(sha256sum "${DEST}.tmp" | awk '{print $1}')
          if [ -z "${expected}" ]; then
            echo "No checksum for ${ASSET} in SHA256SUMS" >&2
            rm -f "${DEST}.tmp" "${DEST}.sums"
            exit 1
          fi
          if [ "${expected}" != "${actual}" ]; then
            echo "Checksum mismatch! expected=${expected} got=${actual}" >&2
            rm -f "${DEST}.tmp" "${DEST}.sums"
            exit 1
          fi

          rm -f "${DEST}.sums"
          mv "${DEST}.tmp" "${DEST}"
          echo "Installed ${DEST}"
          systemd-sysext refresh

systemd:
  units:
    # systemd-resolved runs the mDNS responder/resolver that makes
    # <hostname>.local work (see /etc/systemd/resolved.conf.d/10-mdns.conf above).
    # It's the native, avahi-free way to get hostname.local on Flatcar. Usually
    # already enabled by default; declared here so it's on regardless.
    - name: systemd-resolved.service
      enabled: true

    - name: install-traceway-sysext.service
      enabled: true
      contents: |
        [Unit]
        Description=Download and install Traceway sysext image
        After=network-online.target
        Wants=network-online.target
        ConditionPathExists=!/var/lib/traceway-otel-agent/.sysext-installed

        [Service]
        Type=oneshot
        RemainAfterExit=yes
        ExecStart=/opt/bin/install-traceway-sysext.sh
        ExecStartPost=/bin/touch /var/lib/traceway-otel-agent/.sysext-installed

        [Install]
        WantedBy=multi-user.target

    - name: install-docker-compose-sysext.service
      enabled: true
      contents: |
        [Unit]
        Description=Download and install the docker-compose sysext image
        # time-sync.target: the Pi has no RTC, so wait for the clock to be set
        # before any HTTPS fetch, or TLS cert verification fails (see storage note).
        After=network-online.target time-sync.target
        Wants=network-online.target
        # The downloaded image is its own "done" marker — skip if already present.
        # To force a re-download: rm /etc/extensions/docker_compose.raw && start this unit.
        ConditionPathExists=!/etc/extensions/docker_compose.raw

        [Service]
        Type=oneshot
        RemainAfterExit=yes
        ExecStart=/opt/bin/install-docker-compose-sysext.sh

        [Install]
        WantedBy=multi-user.target

    # ── Swap file (4 GB on /var) ─────────────────────────────────────────────
    # create-swapfile runs once (guarded by ConditionPathExists) to allocate,
    # set permissions, and format the file; var-swapfile.swap activates it.
    - name: create-swapfile.service
      enabled: true
      contents: |
        [Unit]
        Description=Create 4 GB swap file at /var/swapfile
        ConditionPathExists=!/var/swapfile
        DefaultDependencies=no
        Before=var-swapfile.swap

        [Service]
        Type=oneshot
        ExecStart=/usr/bin/dd if=/dev/zero of=/var/swapfile bs=1M count=4096
        ExecStart=/usr/bin/chmod 0600 /var/swapfile
        ExecStart=/usr/sbin/mkswap /var/swapfile

        [Install]
        WantedBy=var-swapfile.swap

    - name: var-swapfile.swap
      enabled: true
      contents: |
        [Unit]
        Description=4 GB swap file
        After=create-swapfile.service

        [Swap]
        What=/var/swapfile

        [Install]
        WantedBy=multi-user.target

    # The traceway-otel-agent.service unit ships *inside* the sysext image
    # (pre-enabled via a multi-user.target.wants symlink baked into the image),
    # so it does not need to be declared here. Ignition cannot enable a unit
    # it can't see at provisioning time, before the sysext is mounted.

    # ── OPTIONAL: Wi-Fi ──────────────────────────────────────────────────────
    # Uncomment together with the two Wi-Fi files in the storage section above.
    # - name: wpa_supplicant@wlan0.service
    #   enabled: true
